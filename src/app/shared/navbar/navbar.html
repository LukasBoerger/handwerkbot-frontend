<nav class="navbar">
  <div class="logo" routerLink="/">
    <div class="logo-icon">🔧</div>
    HandwerkBot
  </div>

  <div class="nav-links">
    @if (auth.isLoggedIn()) {
      <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a class="nav-link" routerLink="/settings" routerLinkActive="active">Einstellungen</a>
      <div class="user-chip" [matMenuTriggerFor]="userMenu">
        <div class="avatar">{{ auth.getUser()?.fullName?.charAt(0) }}</div>
        {{ auth.getUser()?.fullName }}
        <mat-icon style="font-size:16px;width:16px;height:16px;color:var(--text-muted)">expand_more</mat-icon>
      </div>
      <mat-menu #userMenu="matMenu">
        <button mat-menu-item routerLink="/settings">
          <mat-icon>settings</mat-icon> Einstellungen
        </button>
        <mat-divider></mat-divider>
        <button mat-menu-item (click)="auth.logout()">
          <mat-icon>logout</mat-icon> Abmelden
        </button>
      </mat-menu>
    } @else {
      <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Start</a>
      <a class="nav-link" routerLink="/login">Login</a>
      <a class="btn-primary" routerLink="/register">Kostenlos starten</a>
    }
  </div>
</nav>
