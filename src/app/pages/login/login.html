<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">🔧</div>
    <h1 class="auth-title">Willkommen zurück</h1>
    <p class="auth-subtitle">Melden Sie sich in Ihrem Konto an</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      @if (error) {
        <div class="error-banner">
          <mat-icon style="font-size:18px;width:18px;height:18px">error</mat-icon>
          {{ error }}
        </div>
      }

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>E-Mail</mat-label>
        <input matInput formControlName="email" type="email">
        <mat-icon matPrefix>email</mat-icon>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Passwort</mat-label>
        <input matInput formControlName="password"
               [type]="hidePassword ? 'password' : 'text'">
        <mat-icon matPrefix>lock</mat-icon>
        <button mat-icon-button matSuffix type="button"
                (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
      </mat-form-field>

      <button class="submit-btn" type="submit"
              [disabled]="form.invalid || loading">
        @if (loading) {
          <mat-spinner diameter="20"></mat-spinner>
        } @else {
          Anmelden →
        }
      </button>
    </form>

    <hr class="divider">
    <p class="auth-link">
      Noch kein Konto? <a routerLink="/register">Jetzt registrieren</a>
    </p>
  </div>
</div>
